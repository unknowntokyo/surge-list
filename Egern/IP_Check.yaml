name: IP Check
description: 使用说明：设置IP信息URL为http://ipwho.de/json（IPv4+IPv6）或https://4.ipwho.de/json（仅IPv4），在模板参数中指定策略组，并在该策略组下进行测试
compat_arguments:
  策略组: "DIRECT"
  脚本超时: "8"
compat_arguments_desc: 通过模版参数[策略组]指定ipwho.de⁠和speed.cloudflare.com走的策略组，默认为DIRECT，模版参数[脚本超时]设置脚本超时时间，默认为8秒，请在你指定的策略组下进行测试
env_schema:
  ST_TIMEOUT:
    name: 测速超时
    description: 设置测速超时时间，值为毫秒数，默认为6400毫秒
    default_value: "6400"
author: unknownTokyo
rules:
- domain:
    match: speed.cloudflare.com
    policy: "{策略组}"
- domain_suffix:
    match: ipwho.de
    policy: "{策略组}" 
scriptings:
- http_response:
    name: IP Check
    match: ^https?://(4\.)?ipwho\.de
    script_url: https://raw.githubusercontent.com/unknowntokyo/surge-list/master/Egern/IP_Check.js
    update_interval: 86400
    timeout: "{脚本超时}"
    body_required: true
    binary_body: false
mitm:
  hostnames:
    includes:
    - '*.ipwho.de'
    - ipwho.de