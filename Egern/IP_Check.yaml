ame: IP Check
description: 使用说明：设置IP信息URL为http://ipwho.de/json（IPv4+IPv6）或https://4.ipwho.de/json（仅IPv4），并指定策略组，请在你指定的策略组下进行测试
env_schema:
  POLICY:
    name: 指定策略组
    description: 指定ipwho.de⁠和speed.cloudflare.com走的策略组，默认为DIRECT，请在你指定的策略组下进行测试
    default_value: DIRECT
 
  SPEED_TEST_TIMEOUT:
    name: 测速超时时间
    description: 设置带宽测试的超时时间，单位为毫秒，默认4500毫秒，测速超时<脚本超时
    default_value: 4500
    options:
      - 3000
      - 3600 
      - 4000
      - 4500 
      - 5000
      - 6400
 
author: unknownTokyo
rules:
- domain:
    match: speed.cloudflare.com
    policy: "{POLICY}"
- domain_suffix:
    match: ipwho.de
    policy: "{POLICY}"
scriptings:
- http_response:
    name: IP Check
    match: ^https?://(4\.)?ipwho\.de
    script_url: https://raw.githubusercontent.com/unknowntokyo/surge-list/master/Egern/IP_Check.js
    update_interval: 86400
    timeout: 8
    body_required: true
    binary_body: false
mitm:
  hostnames:
    includes:
    - '*.ipwho.de'
    - ipwho.de