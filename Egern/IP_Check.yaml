name: IP Check
compat_arguments:
  POLICY: DIRECT
author: unknownTokyo
rules:
- domain:
    match: speed.cloudflare.com
    policy: "{POLICY}"
- domain_suffix:
    match: ipwho.de
    policy: "{POLICY}"
scriptings:
- http_response:
    name: IP Check
    match: ^https?://(4\.)?ipwho\.de
    script_url: https://raw.githubusercontent.com/unknowntokyo/surge-list/master/Egern/IP_Check.js
    update_interval: 86400
    timeout: "8"
    body_required: true
    binary_body: false
mitm:
  hostnames:
    includes:
    - '*.ipwho.de'
    - ipwho.de