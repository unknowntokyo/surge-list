name: "网上国网 Widget"
description: "网上国网电费 / 电量查询 Widget for Egern"
author: "ChatGPT"
homepage: "https://github.com/Yuheng0101/X"
icon: "bolt.fill"

env_schema:
  SGCC_USERNAME:
    name: "网上国网账号"
    description: "一般是手机号"
    default_value: ""
  SGCC_PASSWORD:
    name: "网上国网密码"
    description: "网上国网 App 登录密码"
    default_value: ""
  SGCC_DEBUG:
    name: "调试日志"
    description: "true 或 false"
    default_value: "false"
    options:
      - "true"
      - "false"
  SGCC_SHOW_RECENT_USAGE:
    name: "显示近日电量"
    description: "true 或 false"
    default_value: "false"
    options:
      - "true"
      - "false"
  SGCC_NOTIFY_ALL_ACCOUNTS:
    name: "显示全部户号"
    description: "true 或 false"
    default_value: "true"
    options:
      - "true"
      - "false"

scriptings:
  - http_request:
      name: "sgcc-api"
      match: '^https?://api\.wsgw-rewrite\.com/electricity/bill/all(?:\?.*)?$'
      script_url: "https://raw.githubusercontent.com/你的用户名/你的仓库/main/sgcc-egern-api-wrapper.js"
      update_interval: 86400
      timeout: 60
      body_required: false
      max_size: 1048576
      env:
        SGCC_USERNAME: ""
        SGCC_PASSWORD: ""
        SGCC_DEBUG: "false"
        SGCC_SHOW_RECENT_USAGE: "false"
        SGCC_NOTIFY_ALL_ACCOUNTS: "true"

  - generic:
      name: "sgcc-widget"
      script_url: "https://raw.githubusercontent.com/你的用户名/你的仓库/main/sgcc-egern-widget.js"
      update_interval: 86400
      timeout: 30
      env:
        API_URL: "https://api.wsgw-rewrite.com/electricity/bill/all"

widgets:
  - name: "网上国网"
    script_name: "sgcc-widget"

mitm:
  hostnames:
    - "api.wsgw-rewrite.com"