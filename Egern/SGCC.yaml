name: "网上国网"
description: "余量查询"
author: "𝐎𝐍𝐙𝟑𝐕"

compat_arguments:
  CRONEXP: "0 9 * * *"
  USERNAME: ""
  PASSWORD: ""
  调试模式: "false"
  近期用量: "false"
  通知全部户号: "false"
  TIMEOUT: "60"

compat_arguments_desc: |-
  CRONEXP: 默认每天9点执行, 只想用接口可以设置成"0 0 30 2 *"

  USERNAME: "https://95598.cn" 或 "网上国网App"的登录账号

  PASSWORD: "https://95598.cn" 或 "网上国网App"的登录密码

  调试模式: 设置true/1代表开启调试模式

  近期用量: 设置true/1代表开启近期用量

  通知全部户号: 设置true/1代表开启通知全部户号

  TIMEOUT: 脚本运行最大时间

scriptings:
  - http_request:
      name: "网上国网接口重写"
      match: "^https?://api\\.wsgw-rewrite\\.com/electricity/bill/all"
      script_url: "https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/95598/95598.js"
      body_required: true
      max_size: -1
      timeout: "{{{TIMEOUT}}}"

  - schedule:
      name: "网上国网"
      cron: "{{{CRONEXP}}}"
      script_url: "https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/95598/95598.js"
      timeout: "{{{TIMEOUT}}}"
      env:
        username: "{{{USERNAME}}}"
        password: "{{{PASSWORD}}}"
        debug: "{{{调试模式}}}"
        show_recent_usage: "{{{近期用量}}}"
        notify_all_accounts: "{{{通知全部户号}}}"

mitm:
  hostnames:
    includes:
      - "api.wsgw-rewrite.com"