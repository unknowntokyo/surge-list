name: "网上国网 Widget"
description: "网上国网电费 / 电量查询 Widget，保留接口重写模式"
author: "ONZ3V / Egern by ChatGPT"

scriptings:
  # 1. 接口重写：负责把 api.wsgw-rewrite.com 转成电费 JSON
  - http_request:
      name: "网上国网接口重写"
      match: "^https?:\\/\\/api\\.wsgw-rewrite\\.com\\/electricity\\/bill\\/all"
      script_url: "https://raw.githubusercontent.com/unknowntokyo/surge-list/master/Egern/SGCC_API.js"
      update_interval: 86400
      body_required: false
      max_size: 1048576
      timeout: 60
      env:
        USERNAME: "你的网上国网账号"
        PASSWORD: "你的网上国网密码"
        DEBUG: "false"
        SHOW_RECENT_USAGE: "false"
        NOTIFY_ALL_ACCOUNTS: "true"

  # 2. Widget 脚本：负责请求上面的接口并显示
  - generic:
      name: "sgcc-widget"
      script_url: "https://raw.githubusercontent.com/unknowntokyo/surge-list/master/Egern/SGCC_Widget.js"
      update_interval: 86400
      timeout: 30
      env:
        API_URL: "https://api.wsgw-rewrite.com/electricity/bill/all"

widgets:
  - name: "网上国网"
    script_name: "sgcc-widget"

mitm:
  hostnames:
    includes:
      - "api.wsgw-rewrite.com"