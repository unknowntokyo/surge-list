name: "网上国网 Widget"
description: "网上国网电量、电费、余额小组件"
author: "custom"
icon: "bolt.square.fill"

env_schema:
  SGCC_USERNAME:
    name: "网上国网账号"
    description: "一般是手机号或网上国网登录账号"
    default_value: ""
  SGCC_PASSWORD:
    name: "网上国网密码"
    description: "网上国网 App 或 95598.cn 登录密码"
    default_value: ""
  ACCOUNT_INDEX:
    name: "户号序号"
    description: "多个户号时选择第几个，默认 0"
    default_value: "0"
  REFRESH_MINUTES:
    name: "刷新间隔分钟"
    description: "建议 30-120"
    default_value: "60"
  TITLE:
    name: "小组件标题"
    description: "不填默认显示户名或户号"
    default_value: "网上国网"

scriptings:
  - http_request:
      name: "sgcc-service"
      match: "^https?:\\/\\/api\\.wsgw-rewrite\\.com\\/electricity\\/bill\\/all"
      script_url: "https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/95598/95598.js"
      body_required: false
      max_size: 10485760
      timeout: 60
      update_interval: 86400
      env:
        SGCC_SERVICE: "true"
        SGCC_SILENT: "true"

  - widget: # 【修复】改为了标准的 Egern widget 声明
      name: "sgcc-widget"
      # 注意：如果你的 JS 是本地文件，请把 script_url 改为 script_path: "SGCC_Widget.JS"
      script_url: "https://raw.githubusercontent.com/unknowntokyo/surge-list/refs/heads/master/Egern/SGCC_Widget.JS"
      timeout: 60
      update_interval: 86400
      env:
        API_URL: "https://api.wsgw-rewrite.com/electricity/bill/all"

mitm:
  hostnames:
    includes:
      - "api.wsgw-rewrite.com"
