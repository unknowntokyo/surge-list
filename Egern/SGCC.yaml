name: "网上国网 Widget"
description: "网上国网电量、电费、余额小组件"
author: "custom"
icon: "bolt.square.fill"

scriptings:
  - http_request:
      name: "sgcc-service"
      match: "^https?:\\/\\/api\\.wsgw-rewrite\\.com\\/electricity\\/bill\\/all"
      script_url: "https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/95598/95598.js"
      body_required: false
      max_size: 10485760
      timeout: 60
      update_interval: 86400
      env:
        SGCC_SERVICE: "true"
        SGCC_SILENT: "true"

  - generic: # 【修复点 1】必须为 generic 类型
      name: "sgcc-widget-script"
      script_url: "https://raw.githubusercontent.com/unknowntokyo/surge-list/refs/heads/master/Egern/SGCC_Widget.JS"
      timeout: 60
      update_interval: 86400

widgets: # 【修复点 2】小组件必须在顶级独立声明，并引用 generic 脚本的名字
  - name: "网上国网"
    script_name: "sgcc-widget-script"
    env: # Egern 小组件的变量在这里直接配置
      API_URL: "https://api.wsgw-rewrite.com/electricity/bill/all"
      ACCOUNT_INDEX: "0"      # 如果有多个户号，改这里（0为第一个）
      REFRESH_MINUTES: "60"   # 刷新时间（分钟）
      TITLE: "网上国网"         # 自定义标题

mitm:
  hostnames:
    includes:
      - "api.wsgw-rewrite.com"