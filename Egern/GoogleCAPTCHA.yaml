name: Google人机验证
description: Google搜索内容时并发使用多个策略/策略组，以避免可能出现的人机验证。

compat_arguments:
  脚本引擎: auto/webview/jsc，默认auto。
  策略正则: 策略/策略组正则表达式
scriptings:
  - http_request:
      name: GoogleCAPTCHA
      match: ^https?:\/\/www\.google\.(co\.jp|com|com\.hk|com\.tw)\/(search\?|$)
      script_url: https://raw.githubusercontent.com/NobyDa/Script/master/Surge/JS/Google_CAPTCHA.js
      body_required: true
      timeout: 5
      arguments:
        _compat.$argument: "engine={{{脚本引擎}}}&argument={{{策略正则}}}"
mitm:
  hostnames:
    includes: 
    - '*.google.co.jp'
    - '*.google.com'
    - '*.google.com.hk'
    - '*.google.com.tw'