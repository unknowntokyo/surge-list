name: Google人机验证
description: "Google搜索内容时并发使用多个策略/策略组，以避免可能出现的人机验证。"

compat_arguments:
  engine: jsc/webview/auto
  policy_regex: 策略/策略组名称
scriptings:
  - http_request:
      name: GoogleCAPTCHA
      match: ^https?:\/\/www\.google\.(co\.jp|com)\/(search\?|$)
      script_url: https://raw.githubusercontent.com/NobyDa/Script/master/Surge/JS/Google_CAPTCHA.js
      body_required: true
      timeout: 10
      arguments:
        _compat.$argument: "engine={{{engine}}}&argument={{{policy_regex}}}"
mitm:
  hostnames:
    - "www.google.co.jp"
    - "www.google.com"
