name: IP Check
description: 提供精准的IP信息展示、全中文显示、IP纯净度显示及下行测速功能，使用说明：设置IP信息URL为http://ipwho.de/json（IPv4+IPv6）或https://4.ipwho.de/json（仅IPv4），并指定策略组，请在你指定的策略组下进行测试
compat_arguments:
  指定策略组: DIRECT  
compat_arguments_desc: 指定 ipwho.de、speed.cloudflare.com 和 ippure.com 走的策略组，默认为 DIRECT，请在你指定的策略组下进行测试

env_schema:
  SHOW_SPEED_TEST:
    name: 下行测速功能
    description: 下行测速的功能开关，开启后可以显示节点的下行带宽，默认关闭，关闭后可以节省流量并加快响应
    default_value: 关闭
    options:
      - 开启
      - 关闭
  SPEED_TEST_PACKET:
    name: 下行测速数据量
    description: 设置单次下行测速的数据量，默认为3MB，网速慢/响应久的可以适当调低该参数
    default_value: 3MB
    options:
      - 1MB
      - 1.5MB
      - 2MB
      - 2.5MB
      - 3MB
      - 3.5MB
      - 4MB
  SPEED_TEST_TIMEOUT:
    name: 测速超时
    description: 设置下行测速的超时时间，默认为4秒，网速慢的可以适当调高该参数
    default_value: 4秒
    options:
      - 2.5秒
      - 3秒
      - 3.5秒
      - 4秒
      - 4.5秒
      - 5秒
      - 5.5秒
      - 6秒
      - 6.5秒
  SHOW_IPPURE:
    name: IP纯净度
    description: IP纯净度的功能开关，开启后可以显示节点的原生属性和风险评级信息，默认关闭，关闭后可以节省流量并加快响应
    default_value: 关闭
    options:
      - 开启
      - 关闭  
author: unknownTokyo
rules:
- domain:
    match: speed.cloudflare.com
    policy: "{{{指定策略组}}}"
- domain_suffix:
    match: ippure.com
    policy: "{{{指定策略组}}}" 
- domain_suffix:
    match: ipwho.de
    policy: "{{{指定策略组}}}"
scriptings:
- http_response:
    name: IP Check
    match: ^https?://(?:4\.)?ipwho\.de(?::\d+)?(?:[/?#]|$)
    script_url: https://raw.githubusercontent.com/unknowntokyo/surge-list/master/Egern/IP_Check-2.js
    update_interval: 86400
    timeout: 8
    body_required: true
    binary_body: false
    env:
      POLICY: "{{{指定策略组}}}" 
mitm:
  hostnames:
    includes:
    - 4.ipwho.de
    - ipwho.de