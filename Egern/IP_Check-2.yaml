name: IP Check
description: 使用说明：设置IP信息URL为http://ipwho.de/json（IPv4+IPv6）或https://4.ipwho.de/json（仅IPv4），在模板参数中指定策略组，并在该策略组下进行测试
compat_arguments:
  POLICY: DIRECT
compat_arguments_desc: 通过模版参数POLICY⁠指定ipwho.de⁠和speed.cloudflare.com走的策略组，默认为DIRECT，请在你指定的策略组下进行测试
author: unknownTokyo
rules:
- domain:
    match: speed.cloudflare.com
    policy: "{POLICY}"
- domain_suffix:
    match: ipwho.de
    policy: "{POLICY}" 
scriptings:
- http_response:
    name: IP Check
    match: ^https?://(4\.)?ipwho\.de
    script_url: https://raw.githubusercontent.com/unknowntokyo/surge-list/master/Egern/IP_Check-2.js
    update_interval: 86400
    timeout: 6
    body_required: true
    binary_body: false
mitm:
  hostnames:
    includes:
    - '*.ipwho.de'
    - ipwho.de